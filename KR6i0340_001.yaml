者有南北異計南宗以賴耶為淨識北宗以賴耶為無明故妙玄云今明無明之心不自不他不共不無因四句皆不可思議此約自行破計南此不存無著攝大乘論亦有二譯之殊梁諦師所譯者立九識計八識生起諸法十二因緣唐奘師所譯但立八識謂第九只是八識異名故有梁唐之異南北之殊宗鏡又云此阿賴耶識即是真心不守自性隨染淨緣不合而合能含藏一切真俗境界故名藏識如明鏡不與影像合而含影像此約有和合義邊説若不和合義者即體常不變故號真如因合不合分其二義本一真心湛然不動若有不信阿賴耶識即是如來藏別求真如理者如離像覓鏡即是惡慧以未了不變隨緣隨緣不變之義而生二執宗鏡所論深切著明固可釋後人之疑然真常淨識與此經真識初無少異但所宗者不能詳辨此識是賴耶之體雖有所分更無別體須知此經止於八相中略説三種識不同他經立九識也八相亦識耳大慧譬如明鏡持諸色像現識處現亦復如是宗鏡云如是七識於阿賴耶識中盡相應起如衆影像俱現鏡中大慧現識及分別事識此二壞不壞相展轉因實叉云現識與分別事識此二識無異相互為因注云此明七六與五生滅變相五識壞不壞相者眼等識一念得塵即滅名壞色習氣轉入六識名不壞七識壞不壞相者七識緣六識造善惡業念念生滅名壞業習依如來藏得未來生死名不壞大慧不思識熏及不思議變是現識因賢首云謂無明能熏真如不可熏處而能熏故名不思議熏謂真如心受無明熏不可變異而變異故名不思議變大慧取種種塵及無始妄想熏是分別事識因實叉云現識以不思議熏變為因分別事識以分別境界及無始戲論習氣為因大慧若覆彼真識種種不實諸虗空滅則一切根識滅是名相滅楊云覆有反復之義謂回光返照還於真識則一切根塵泯為法界所有性相復何覩哉大慧相續滅者謂無始虗妄習氣既滅則一切根量識相自然不滅而滅也相續所因滅則相續滅依因妄想故有相續因滅則相續安附所從滅及所緣滅則相續滅所從之識所緣之塵既滅則相續復何所附大慧所以者何是其所依故依者謂無始妄想熏緣者謂自心見等識境妄想注云此是外塵實叉云所依因者謂無始戲論虗妄習氣所緣者謂自心所見分別境界大慧譬如泥團微塵非異非不異金莊嚴具亦復如是謂泥團異於微塵則泥團因微塵而成故不可言異謂泥團不異於微塵則泥團名與微塵異故不可言不異又如良工以金作瓶盤叉釧之具異與不異如之故下文云云大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者則泥團微塵應無分別如是大慧轉識藏識真相若異者藏識非因注云轉識五六七識藏識八識轉識因藏識而有若異則不因藏識而有既因藏識而有則不異矣若不異者轉識滅藏識亦應滅而自真相實不滅藏識真相既實不滅則與轉識異矣此明非異非不異也是故大慧非自真相識滅但業相滅若自真相識滅者藏識則滅蘇楊二本真相下無識字明轉識之業相滅藏識真相實不滅也大慧藏識滅者不異外道斷見論議大慧彼諸外道作如是論謂攝受境界滅識流注亦滅若識流注滅者無始流注應斷若識流注滅者謂諸識滅則無始藏識亦應滅滅則同外道斷見蓋牒上藏識實不滅也流注即相續義前之云根識俱滅者以轉而成智為滅非以斷滅為滅大慧外道説流注生因非眼識色明集會而生更有異因大慧彼因者説言若勝妙若士夫若自在若時若微塵實叉云彼諸外道説相續識從作者生不説眼識依色光明和合而生唯説作者為生因故作者是何彼計勝性丈夫自在時及微塵為能作者新説云勝性亦云勝妙是生梵天之天主也丈夫即神我之別名自在謂大自在天及計時節微塵等為能作者士夫亦云丈夫楊云不滅真相即達磨所傳之一心也明靈虗徹亘古亘今究其本源無有間雜妄想和合乃有諸識諸識所現乃有諸相諸相不常乃有生住滅覺此則涅槃樂迷此則生死河達道之人覺彼所現幻塵不實皆由無始妄想所熏回光返照還於真識如水歸坎流浪自停如火歸空光芒頓滅便可逍遙自在心境俱忘永謝諸塵端然實相蓋為熏習尚在未免攀緣終日依他不自知覺間有強生知見立自本心不知陰界藏身徒然以佛覓佛一則依他境界一則以心緣心二病未除妄相相續故如來必欲從緣俱息依因並捐轉業兼離真相永淨是道也非從他得只是家珍目前歷歷孤明認著依前埋沒不須取捨本自圓成但離妄緣即是實際佛語心品明此而已復次大慧有七種性自性所謂集性自性性自性相性自性大種性自性因性自性緣性自性成性自性謂熏習所聚成集自性既成集自性則法法自爾故成性自性既成性自性則性隨質顯故成相自性既成相自性則相假形分故成大種自性既成大種自性則大依妄立故成因自性既成因自性則因待緣生故成緣自性既成緣自性則因緣相即故成成自性也蓋性以不遷為義故皆以自性綴之實叉所譯七種性除性自性皆無上之性字注云上七種成上妄識生滅身復次大慧有七種第一義所謂心境界慧境界智境界見境界超二見境界超子地境界如來自到境界心境界者謂心本無境界以凝然不動故諸虗妄不能入也心既凝然則能發慧慧力既勝則成智用既成智用則正見現前正見現前則超有無二見以至復能超過子地及等覺地到如來自到境界也子地即九地注云上七種成上真識不生滅法身大慧此是過去未來現在諸如來應供等正覺性自性第一義心以性自性第一義心成就如來世間出世間出世間上上法聖慧眼入自共相建立如所建立不與外道論惡見共實叉云以聖慧眼入自共相種種安立不與外道惡見共大慧云何外道論惡見共所謂自境界妄想見不覺識自心所現分齊不通大慧愚癡凡夫性無性自性第一義作二見論楊云外道惡見於自境界但起妄想之見流支實義皆以識為知謂凡夫於自心現分齊不通罔知非性非無性而於自性第一義作有無見論復次大慧妄想三有苦滅無知愛業緣滅自心所現幻境隨見今當説計無明煩惱善惡因緣諸法滅得涅槃者是自心現幻妄境界隨外道妄見我今當説大慧若有沙門婆羅門楊云自此已下至妄稱一切智説皆外道見欲令無種有種因果現及事時住緣陰界入生住或言生已滅大慧彼若相續若事若生若有若涅槃若道若業若果若諦破壞斷滅論楊云外道斷見於若相續等句一切破壞而斷滅之所以者何以此現前不可得及見始非分故楊云以不見根本故曰見始非分大慧譬如破瓶不作瓶事亦如焦種不作牙事楊云外道斷見於法悉如破瓶焦種者如是大慧若陰界入性已滅今滅當滅自心妄想見無因故彼無次第生實叉云大慧有諸沙門婆羅門妄計非有及有於因果外顯現諸物依時而住或計蘊界處依緣生住有已即滅大慧彼於若相續若作用若生若滅若諸有若涅槃若道若業若果若諦是破壞斷滅論何以故不得現法故不見根本故大慧譬如瓶破不作瓶事又如焦種不能生芽此亦如是若蘊界處法已現當滅應如此則無相續生以無因故但是自心虗妄所見大慧若復説無種有種識三緣合生者龜應生毛沙應出油汝宗則壞違決定義有種無種説有如是過所作事業悉空無義新説云此重復次於前文破轉計也謂彼轉計所生與無種有種三緣和合而生者龜應生毛沙應出油然龜本無毛沙本無油合亦不生三緣體空如何生果汝宗則壞違決定義者喻斥不成故言宗壞以違汝決定能生之義又於一相中妄計三緣違我大乘決定之義所作事業悉空無益者事即是果業乃是因言因果事業並唯妄説都無實義實叉以無義為無益大慧彼諸外道説有三緣合生者所作方便因果自相過去未來現在有種無種相從本已來成事相承覺想地轉自見過習氣作如是説注云牒上外道見以三緣所作方便生陰界入因果自相成三世法揚云非自覺而隨境有覺曰覺想謂外道從本以來以有種無種相生成三世因果有無事業也此之事業與覺想相依則轉自惡見不知為熏習之過作如是説故實叉云依住覺想地者所有教理及自惡見熏習餘氣作如是説如是大慧愚癡凡夫惡見所害邪曲迷醉無智妄稱一切智説大慧若復諸餘沙門婆羅門自此下皆論正見與外道異見離自性浮雲火輪揵闥婆城無生幻𦦨水月及夢注云見無自性如浮雲等知無生如幻等內外心現妄想無始虗偽不離自心楊云所以能離彼自性者以覺知所現妄偽悉不離自心故妄想因緣滅盡離妄想説所説觀所觀受用建立身之藏識謂妄想因緣滅盡則此妄想於所説所觀身資生具及藏識境界脫然離之也於識境界攝受及攝受者不相應注云觀我所空故妄心不與前境相應楊云謂之不相應則其情滅矣無所有境界離生住滅自心起隨入分別楊云識境不相應則無所有至無所有則一切生滅離所謂真心任遍知也大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便大慧彼於一切衆生界皆悉如幻不勤因緣遠離內外境界心外無所見次第隨入無相處次第隨入從地至地三昧境界解三界如幻分別觀察當得如幻三昧度自心現無所有流支云入自心寂靜境界故得住般若波羅蜜捨離彼生所作方便金剛喻三摩提隨入如來身隨入如如化神通自在慈悲方便具足莊嚴等入一切佛剎外道入處流支云入一切佛國土故入一切衆生所樂處故離心意意識是菩薩漸次轉身得如來身實叉云此菩薩摩訶薩不久當得生死涅槃二種平等大悲方便無功用行觀衆生如幻如影從緣無起知一切境界離心無得行無相道漸升諸地住三昧境了達三界皆唯自心得如幻定絶衆影像成就智慧證無生法入金剛喻三昧當得佛身恆住如如起諸變化力通自在大悲方便以為嚴飾遊衆佛國離諸外道及心意識轉依次第成如來身新説云此菩薩即上正見沙門婆羅門也行無相道者謂萬行齊修三輪體寂也漸升諸地者謂初登歡喜地乃至第七遠行地也證無生法者謂得無功用道登第八不動地也入金剛喻三昧者謂初地菩薩創得無分別智斷異生性障二地至十地菩薩如實修行漸斷諸障增勝功德第十一地等覺菩薩金剛喻定頓斷俱生二障種子也轉依次第成如來身者即等覺後念解脫道斷二障習氣即得如來無上菩提及大涅槃二轉依果也一謂轉染得淨二謂轉迷得悟婆沙論云心即意識如火名焰亦名為熾亦名燒薪秪是一心有三差別百法論疏云第八名心第七名意前六名識大慧是故欲得如來隨入身者當遠離陰界入心因緣所作方便生住滅妄想虗偽唯心直進觀察無始虗偽過妄想習氣因三有思惟無所有佛地無生到自覺聖趣言欲得佛身應當遠離陰界入等知諸法唯心直進無疑觀察無始虛偽及思惟三昧無有一法可當情則證佛地無生到自覺聖趣自心自在到無開發行即無功用行如隨衆色摩尼隨入衆生微細之心而以化身隨心量度注云以應化身隨衆生心量大小為説度門諸地漸次相續建立注云明受化人得諸地相續是故大慧自悉檀善應當修學以所宗聖趣為善勉之令學新説云謂此一心法門是凡聖之本迷之墮世間生死悟之證出世菩提故先聖曰世間不越三科出世不過二果二果者即如上釋成如來身二轉依果也三科者即此五蘊十二處十八界諸妄心法也爾時大慧菩薩復白佛言世尊所説心意意識五法自性相一切諸佛菩薩所行自心見等所緣境界不和合顯示一切説成真實相一切佛語心為楞伽國摩羅耶山海中住處諸大菩薩説如來所歎海浪藏識境界法身實叉云此是一切諸佛菩薩入自心境離所行相稱真實義諸佛教心唯願如來為此山中諸菩薩衆隨順過去諸佛演説藏識海浪法身境界新説云大慧雖通請説心意意識五法自性相意欲如來且成前問是故結請但云順諸佛説藏識海浪法身境界也言稱真實義諸佛教心者揀非虗妄心識也凡言心者略示名體通有四種梵音各別翻譯亦殊一紇利陀耶此云肉團心是色身中五藏心也二緣慮心此是八識俱能緣慮自分境故此八各有心數亦云心所於中或無記或通善染之殊諸經論中目心所法總名心也謂善心惡心等三質多耶此云集起心唯是根本第八識也積集諸法種子起現行故四乾栗陀耶此云貞實心亦云堅實心此是真實心也然第八識無別自體但是真心以不覺故與諸妄想而有和合不和合義和合義者能含染淨目為藏識不和合者體常不變目為真如即此離所行相稱真實義諸佛教心也雖然四種體同迷悟真妄義別如取真金須明識瓦礫及以偽寶但盡除之縱不識金金體自現稱真實義諸佛教心即成真實相一切佛語心也爾時世尊告大慧菩薩言四因緣故眼識轉注云眼識取塵轉入六識耳鼻舌身亦復如是何等為四謂自心現攝受不覺無始虗偽過也習氣計著識性自性欲見種種色相實叉云所謂不覺自心現而執取故無始時來取著於色虗妄習氣故識本性如是故樂見種種諸色相故新説云佛言有四因緣眼識轉轉生也一謂不覺外塵是自心現而執取故二謂無始以來取著於色妄想熏習不斷故三謂識以了別為自性故四謂樂欲見諸色相故大慧是名四種因緣水流處藏識轉識浪生言藏識如水流注轉為七識猶波海水變為波浪則諸識之浪洶湧而生眼識既爾餘識亦然下文謂非自覺聖智趣藏識轉者是轉識成智為如來藏此即轉智成識為末那也大慧如眼識一切諸根微塵毛孔俱生隨次境界生亦復如是譬如明鏡現衆色像猶如猛風吹大海水實叉以俱生為順生隨次生為漸生新説云如眼識既爾餘諸識亦如是於一切諸根微塵毛孔眼等諸轉識或頓生譬如明鏡現衆色像無有前後或漸生猶如猛風吹大海水前波起後波隨言微塵毛孔者即色塵身根也外境界風飄蕩心海識浪不斷因所作相異不異合業生相深入計著不能了知色等自性故五識身轉大慧即彼五識身俱因差別分段相知當知是意識因實叉云因所作相非一非異業與生相相繫深縛不能了知色等自性五識身轉大慧與五識俱或因了別差別境相有意識生新説云此明諸識展轉互為因也言因所作相非一非異者因即第八如來藏識也所作相謂七轉識從第八所生也非一者諸識行相不同也非異者同皆緣起無自性也言業與生相相繫深縛者謂第八識變起根身器界名為生相六七二識無明覆故由此執為實我實法第六意識引起前五造引滿業感諸異報生死不絶故云業與生相相繫深縛是皆不了色等諸塵自心妄現故五識身轉也大慧眼等五識與五塵俱時或因了別色等差別境相而意識生也是故當知根身塵境一切諸法皆是衆生自心妄識互為因果之所現也故伽陀云諸法於藏識識於法亦爾更互為因相亦互為果相彼身轉彼不作是念我展轉相因自心現妄想計著轉而彼各各壞相俱轉分別境界分段差別實叉云然彼諸識不作是念我等同時展轉為因而於自心所現境界分別執著俱時而起無差別相各了自境新説云彼諸識等各了自境者此明八識俱能了別自分境故不知唯是自心妄現也謂色是眼識境乃至賴耶見分是第七識境根身種子器界是藏識境然此八識離如來藏無別自體以衆生不知故執為八識之名諸佛證得故能成四智之用若昧之則八識起執藏之號七識得染汙之名六識起遍計之情五識徇根塵之相若了之則賴耶成圓鏡之體持功德之門末那為平等之原一自他之性第六起觀察之妙轉正法之輪五識興所作之功垂應化之迹斯則一心匪動識智自分不轉其體但轉其名不分其理而分其事謂彼轉如修行者入禪三昧微細習氣轉而不覺知而作是念識滅然後入禪正受實不識滅而入正受以習氣種子不滅故不滅以境界轉攝受不具故滅實叉云諸修行者入於三昧以習力微起而不覺知但作是念我滅諸識入於三昧實不識滅而入三昧以彼不滅習氣種故但不取諸境名為織滅新説云上明諸識展轉為因各了自境妄想流注欲轉諸識成智用者以根本藏識微細難知故舉二乘修劣三昧不知諸識習氣種子依藏識不滅自謂我滅諸識入於三昧而實未也但伏六識不取塵境彼將為滅以定力之勝故諸識不具攝受大慧如是微細藏識究竟邊際除諸如來及住地菩薩諸聲聞緣覺外道修行所得三昧智慧之力一切不能測量決了實叉云如是藏識行相微細唯除諸佛及住地菩薩其餘一切二乘外道定慧之力皆不能知此下指地前菩薩如實行者餘地相智慧巧便分別決斷句義最勝無邊善根成熟離自心現妄想虗偽實叉云唯有修行如實行者以智慧力了諸地相善達句義無邊佛所廣集善根不妄分別自心所見能知之耳此下指諸修行人宴坐山林下中上修能見自心妄想流注無量剎土諸佛灌頂得自在力神通三昧諸善知識佛子眷屬彼心意意識自心所現自性境界虗妄之想生死有海業愛無知如是等因悉已超度實叉自流注下作得諸三昧自在力通諸佛灌頂菩薩圍繞知心意意識所行境界超愛業無明生死大海是故大慧諸修行者應當親近最勝知識新説云下中上修言人分量也分別流注即上二種生住滅也餘義如文親近善知識者如馬鳴曰諸佛法者有因有緣因緣具足乃得成辦如木中火性是火正因若無人知不假方便能自燒木無有是處衆生亦爾雖有正因熏習之力不遇諸佛菩薩知識示教利喜慈悲攝護以之為緣能自斷煩惱入涅槃者則無是是爾時世尊欲重宣此義而説偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生青赤種種色珂乳及石蜜淡味衆華果青赤等種種之色能起眼識珂珮等種種之聲能起耳識檀乳等種種之香能起鼻識甘淡等種種之味能起舌識美樂等種種之具能起身識華果等種種之法能起意識是為境界之風華果者宗鏡云現在之華未來之果種種法塵隨為彼識所緣境界也日月與光明非異非不異非異者謂光明無日月輪則不生非不異者謂光明與日月輪應無有異下海水同意海水起波浪狀諸識之起因七識亦如是心俱和合生譬如海水變實叉作動種種波浪轉狀諸識之競馳七識亦如是心俱和合生謂彼藏識處指前水流處種種諸識轉謂以彼意識思惟諸相義不壞相有八無相亦無相實叉云八識無別相無能相所相宗鏡云如是八識從無始來三際不動四相不遷真實常住自性清淨不壞之相具足圓滿無所闕少而如是等一切功德同法界故無有二相無二相故唯是一相唯一相故亦是無相皆以無相故無相亦無相譬如海波浪是則無差別諸識心如是異亦不可得無差別也心名採集業意名廣採集諸識識所識現等境説五實叉云心能積集業意能廣積集了別故名識對現境説五新説云諸識本寂妄塵無體由不覺故前五識轉攬現塵境第六分別起惑造業第七傳送執我我所能廣積集同為能熏第八藏識受熏持種積集不亡展轉為因流轉不息故如上所云爾時大慧菩薩以偈問曰青赤諸色像衆生發諸識如浪種種法云何唯願説新説云上云青赤等塵發生諸識如海波浪皆非一異又云心積集等行相有殊故致斯問爾時世尊以偈答曰青赤諸雜色波浪悉無有採集業説心開悟諸凡夫此明色即是空空即是色以覺諸凡夫也彼業悉無有自心所攝離所攝無所攝與彼波浪同此重明青赤波浪等句義也受用建立身是衆生現識於彼現諸業譬如水波浪此重明採集業感報依正不同皆是衆生自心妄現爾時大慧菩薩復説偈言大海波浪性鼓躍可分別藏與業如是何故不覺知此約法喻而難爾時世尊以偈答曰凡夫無智慧藏識如巨海業相猶波浪依彼譬類通凡夫無智不能覺知藏識如海而常住業相似浪而轉生故舉喻引類令彼通解爾時大慧菩薩復説偈言日出光等照下中上衆生如來照世間為愚説真實已分部諸法何故不説實問如來應世以平等度生如日之出高低普照雖已分別説三乘諸差別法何故不説真實之義爾時世尊以偈答曰若説真實者彼心無真實譬如海波浪鏡中像及夢一切俱時現心境界亦然此偈初二句法説謂非器不堪聞實非不平等次三句舉三喻況彼心無實後一句以法合喻故云亦然境界不具故次第業轉生識者識所識意者意謂然五則以顯現無有定次第此偈明外境緣不同具內識即次第轉生以第六識分別諸法塵故云識者識所識意緣阿賴耶起我我所執故云意者意謂然五識隨塵顯現無有次第可定譬如工畫師及與畫弟子布彩圖衆形我説亦如是彩色本無文非筆亦非素為悅衆生故綺錯繪衆像此偈言畫色本無形隨形即畫像以況如來本無法隨機即説法豈得止説一種法也言説別施行直實離名字分別應初業修行示真實真實自悟處覺相所覺離此為佛子説愚者廣分別種種皆如幻雖現無真實如是種種説隨事別施設所説非所應於彼為非説此偈正明如來應機説異也初三句總標説意次四句謂對利根説一乘真實法次五句謂對餘鈍根説種種如幻法一一如文後二句謂所説法不應機者翻為妄語故云非説彼彼諸病人良醫隨處方如來為衆生隨心應量説實叉以處方為授藥此偈又以良醫隨病處方不同況如來應量説法有異故不得如日平等照物以結前問妄想非境界聲聞亦非分哀愍者所説自覺之境界實叉以妄想為外道哀愍為依怙哀愍者即如來也如來説自覺境界非外道聲聞境界也已上釋大慧與世尊問答偈意多本新説復次大慧若菩薩摩訶薩欲知自心現量攝受及攝受者妄想境界當離羣聚習俗睡眠實叉云若欲了知能取所取分別境界皆是自心之所現者當離憒閙昏滯睡眠初中後夜常自覺悟修行方便當離惡見經論言説實叉以惡見為外道及諸聲聞緣覺乘相當通達自心現妄想之相新説云能取所取亦云能緣所緣謂即心識見相二分也欲了知者應離浮沈諸惡覺觀真實修行也復次大慧菩薩摩訶薩建立智慧相住已於上聖智三相當勤修學建立智慧相住已即上云通達自心現妄想之相何等為聖智三相當勤修學所謂無所有相一切諸佛自願處相自覺聖智究竟之相修行得此已能捨跛驢心智慧相得最勝子第八之地則於彼上三相修生楊云謂第七地觀三界生死不定心名跛驢以不能行故謂未得無功用慧故以跛驢況之大慧無所有相者謂聲聞緣覺及外道相彼修習生大慧自願處相者謂諸先佛自願處修生大慧自覺聖智究竟相者一切法相無所計著得如幻三昧身諸佛地處進趣行生實叉云大慧無影像相者謂由慣習一切二乘外道相故而得生起一切諸佛願持相者謂由諸佛自本願力所加持故而得生起自證聖智所趣相者謂由不取一切法相成就如幻三昧身趣佛地智故而得生起二乘外道所習淺陋如來常種種訶叱於此亦取之者欲其回心捨邪途入正轍也大慧是名聖智三相若成就此聖智三相者能到自覺聖智究竟境界是故大慧聖智三相當勤修學爾時大慧菩薩摩訶薩知大菩薩衆心之所念名聖智事分別自性經承一切佛威神之力而白佛言世尊惟願為説聖智事分別自性經百八句分別所依如來為説八識轉相已大慧繼以聖智事分別妄計自共相差別所依之法為請如來應供等正覺依此分別説菩薩摩訶薩入自相共相妄想自性以分別説妄想自性故則能善知周遍觀察人法無我淨除妄想照明自性超越一切聲聞緣覺及諸外道諸禪定樂觀察如來不可思議所行境界畢定捨離五法自性諸佛如來法身智慧善自莊嚴起幻境界實叉云入如幻境升一切佛剎兜率天宮乃至色究竟天宮逮得如來常住法身新説云自相共相者五陰不同名自相共成人身名共相界處等亦爾乃至一切諸法各各又有自相共相也五陰是妄想自性兜率陀者此云知足彼天內宮是一生補處菩薩所居也色究竟天是行滿報佛成正覺處餘文悉明遠離過習顯示衆德成就如來法身之義以有是利故請佛為説如上法門佛告大慧有一種外道作無所有妄想計著覺知因盡兔無角想如兔無角一切法亦復如是外道計無而生斷見見一切法隨因而盡想兔無角諸法亦無大慧復有餘外道見種求那極微陀羅驃形處橫法各各差別見已計著無角兔橫法作牛有角想外道計有而生常見種即大種求那陀羅驃皆塵也故實叉云見大種求那塵等諸物形量分位各差別已執兔無角於此而生牛有角想此明敘彼二外道計以不了故互執異見生決定解自下如來約牛兔角破執名相起妄想見大慧彼墮二見不解心量自心境界妄想增長實叉云彼墮二見不了唯心但於自心增長分別此破起見因身受用建立妄想根量實叉云身及資生器世間等一切皆唯分別所現此示唯妄現大慧一切法性亦復如是離有無不應作想實叉云應知兔角離於有無諸法悉然勿生分別此總結應離妄也大慧若復離有無而作兔無角想是名邪想彼因待觀故兔無角不應作想實叉云云何兔角離於有無互因待故此別徵破彼墮無見也謂云何兔角離於有無破云互因待故彼兔角無因牛角有故若無牛角彼何所因而言無耶乃至微塵分別事性悉不可得實叉云分析牛角乃至微塵求其體相終不可得此別破彼墮有見也謂若執於牛有角者分析牛角至於極微何有實體而計有耶大慧聖境界離不應作牛有角想實叉云聖智所行遠離彼見是故於此不應分別聖智所行離彼見者謂如實見者悉離有見常見之有亦離邪見斷見之無是故結勸應離分別爾時大慧菩薩摩訶薩白佛言世尊得無妄想者見不生想已隨比思量觀察不生妄想言無耶大慧意謂角有無想破而不立彼得無妄想見不生妄想已則隨其比度思量豈不以觀察不生妄想為無而言無耶佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故因彼角有無而生依彼角生妄想以依角生妄想是故言依因故離異不異故非觀察不生妄想言無角因有角無角而生妄想是有所依或無所依但角與妄想離異不異非觀察不生而言無角離即非也大慧若復妄想異角者則不因角生若不異者則因彼故若妄想分別定異兔角者則非角因若定不異者又是因彼而起言俱無自性也乃至微塵分析推求悉不可得不異角故彼亦非性二俱無性者何法何故而言無耶注云分析牛角乃至極微求不可得則不異兔角彼牛角亦無性若牛角兔角二俱無實者對何法言有何故得説兔角為無大慧若無故無角觀有故言兔無角者不應作想若無牛角則無兔角觀牛角有故言兔角無此所以有為無因不得作無想大慧不正因故而説有無二俱不成謂有無互相為因初無有正既二因不正有無兩果理自不成也大慧復有餘外道見計著色空事形處橫法不能善知虗空分齊言色離虗空起分齊見妄想實叉云復有外道見色形狀虗空分齊而生執著言色異虗空起於分別大慧虗空是色隨入色種大慧色是虗空持所持處所建立性新説云空即是色隨入色種中故色外無空也色即是空能持所持建立性故非色滅空也色空事分別當知流支云依色分別虗空依虗空分別色故實叉云色空分齊應如是知大慧四大種生時自相各別亦不住虗空非彼無虗空新説云會昔權説重明色空不二也謂昔破外道執有我故説有造色從大種生自相各別而密顯造色性即空故更無別色而住於空故云不住非彼無虗空如是大慧觀牛有角故兔無角大慧又牛角者析為微塵又分別微塵剎那不住實義云又析彼塵其相不現彼何所觀故而言無耶若言觀餘物者彼法亦然餘物即虗空色相也新説云此又引上牛兔二角以合色空類觀諸法差別妄見一一對破應知亦爾楊云人見廓然大空以是為空而不知色之所聚人見其色具諸名相以是為色而不知為空所持是皆於無性之中而妄有建立者然也此以明外道因牛角之有而遂言兔角之無不知析彼牛角為微塵又復歸於無矣謂牛角既析而歸空又何所觀故而言兔角之無也四大種雖不住空而非無空亦如牛角之有而復啼於無爾時世尊告大慧菩薩摩訶薩言當離兔角牛角虗空形色異見妄想汝等諸菩薩摩訶薩當思惟自心現妄想隨入為一切剎土最勝子以自心現方便而教授之爾時世尊欲重宣此義而説偈言色等及心無色等長養心色塵等與虗妄心本無所有而虗妄心因色塵等滋生之也身受用安立識藏現衆生流支云內識衆生見身資生住處心意及與識自性法有五無我二種淨廣説者所説流支云如來如是説長短有無等展轉互相生以無故成有以有故成無微塵分別事不起色妄想心量安立處惡見所不樂謂外道不信樂唯心故覺想非境界聲聞亦復然救世之所説自覺之境界實叉以覺想為外道流支以救世為如來新説云此約外道執牛兔角決定有無及色空異以破五法中名相妄想竟爾時大慧菩薩為淨除自心現流故復請如來白佛言世尊云何淨除一切衆生自心現流為頓為漸耶新説云此就淨衆生心習現流五性中次明正智義謂能淨者自覺聖智也所淨者自心現流也佛告大慧漸淨非頓如菴羅果漸熟非頓菴羅果見前阿摩勒注如來淨除一切衆生自心現流亦復如是漸淨非頓譬如陶家造作諸器漸成非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如大地漸生萬物非頓生也如來淨除一切衆生自心現流亦復如是漸淨非頓譬如人學音樂書畫種種技術漸成非頓如來淨除一切衆生自心現流亦復如是漸淨非頓上則淨除自心現流故從漸下則顯示衆生不思議智故從頓譬如明鏡頓現一切無相色像如來淨除一切衆生自心現流亦復如是頓現無相無有所有清淨境界如日月輪頓照顯示一切色像如來為離自心現習氣過患衆生流支云為令衆生遠離自心煩惱見熏習氣過患亦復如是頓為顯示不思議智最勝境界譬如藏識頓分別知自心現及身安立受用境界彼諸依佛亦復如是頓熟衆生所處境界以修行者安處於彼色究竟天流支云譬如阿梨耶識分別現境自身資生器世間等一時而知非是前後大慧報佛如來亦復如是一時成熟諸衆生界置究竟天淨妙宮殿修行清淨之處譬如法佛所作依佛實叉云譬如法佛頓現報佛光明照耀自覺聖趣亦復如是彼於法相有性無性惡見妄想照令除滅新説云明四漸四頓者謂淨衆生自心現流其機大者頓之其機小者漸之漸者言其權頓者言其實權以趨實實以導權所以聖人開悟衆生或頓或漸權實偏圓未始不相須者廉使含識隨宜得入也大慧法依佛説一切法入自相共相自心現習氣因相續妄想自性計著因種種不實如幻種種計著不可得新説云此明三佛建立説法釋成頓漸所顯義也前引依佛為證次從法佛中表出依佛此則正顯依佛自法佛而起説法如現尊特身説雜華蓋三身一體疑者謂報身不能説法尚不知報身説法又安知剎説衆生説耶蘇楊二本皆作報佛獨注本作法依佛流支亦云法佛報佛説一切法自相同相故實叉云法性所流佛説一切法自相共相得其旨哉依佛即報佛也説一切自共相法是自心本識現習氣因相及前轉識妄計所執因相種種不實如幻而衆生不了種種執著取以為實豈不誤哉復次大慧計著緣起自性生妄想自性相大慧如工幻師依草木瓦石作種種幻起一切衆生若干形色起種種妄想彼諸妄想亦無真實新説云明緣起不實如幻師依草木起衆生色像譬如來藏性隨緣起種種諸法如是大慧依緣起自性起妄想自性種種妄想心種種相行事妄想相計著習氣妄想是為妄想自性相生大慧是名依佛説法實義云由取著境界習氣力故於緣起性中有妄計性種種相現是名妄計性生大慧是名法性所流佛説法相大慧法佛者離心自性相即下文離攀緣等自覺聖所緣境界建立施作即下文自覺聖究竟差別相建立大慧化佛者説施戒忍精進禪定及心智慧離陰界入解脫識相分別觀察建立超外道見無色見外道以無色為涅槃大慧又法佛者離攀緣攀緣離一切所作根量相滅非諸凡夫聲聞緣覺外道計著我相所著境界自覺聖究竟差別相建立是故大慧自覺聖究竟差別相當勤修學自心現見應當除滅復次大慧有二種聲聞乘通分別相謂得自覺聖差別相及性妄想自性計著相謂上勉菩薩修自覺聖究竟差別相已然於聲聞乘二種通分別相中亦有自覺聖差別相如來慮其混殽故綴而明之云何得自覺聖差別相聲聞謂無常苦空無我境界真諦離欲寂滅息陰界入自共相外不壞相如實知心得寂止心寂止已禪定解脫三昧道果正受解脫不離習氣不思議變易死得自覺聖樂住聲聞是名得自覺聖差別相聲聞實叉云云何自證聖智殊勝相謂明見苦空無常無我諸諦境界離欲寂滅故於蘊界處若自若共外不壞相如實了知故心住一境住一境已獲禪解脫三昧道果而得出離住自證聖智境界樂未離習氣及不思議變易死是名聲聞乘自證聖智境界相唯識論云一分段生死謂諸有漏善不善業由煩惱障緣助勢力所感三界粗異熟果身命短長隨因緣力有定劑限故名分段二不思議變易生死謂諸無漏有分別業由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定劑限故名變易無漏定願正所資感妙用難測名不思議大慧得自覺聖差別樂住菩薩摩訶薩非滅門樂正受樂顧憫衆生及本願不作證大慧是名聲聞得自覺聖差別相樂菩薩摩訶薩於彼得自覺聖差別相樂不應修學謂前聲聞得此自覺聖差別相息陰界入趣寂滅樂不能如菩薩摩訶薩住八地無生正受樂能顧憫衆生以大悲本願力故而不取證入涅槃也前之是名等結得差別相之聲聞此之是名等結聲聞得差別相之樂誡諸菩薩於此樂中不應修學以彼聲聞所得之樂非究竟故大慧云何性妄想自性計著相聲聞實義云云何分別執著自性相所謂大種青黃赤白堅濕暖動非作生自相共相先勝善説見已於彼起自性妄想流支云堪量相應阿含先勝見善説故依彼法虗妄執著以為實有此謂聲聞知彼四大及造色自共相種種諸法非如外道計作者生然守如來止啼權説於彼四大種性計自性有故言起自性妄想菩薩摩訶薩於彼應知應捨隨入法無我相滅人無我相見漸次諸地相續建立菩薩於自性妄想應知應捨了我法空漸入智地到如來境是名諸聲聞性妄想自性計著相此一種計著相聲聞頗盛故以諸聲聞性結之爾時大慧菩薩摩訶薩白佛言世尊世尊所説常不思議自覺聖趣境界及第一義境界世尊非諸外道所説常不思議因緣耶大慧所問因世尊謂菩薩自覺聖差別究竟相樂不與聲聞所得者同故以常句之常及不思議智請曰如來所説常不思議得非與外道所説者同耶佛告大慧非諸外道因緣得常不思議如來所説常不思議以自覺聖相為相第一義智因為因外道所説常不思議計神我為因以無常為常故言非也所以者何諸外道常不思議不因自相成謂彼常不思議不因自覺聖相第一義智而成若常不思議不因自相成者何因顯現常不思議復次大慧不思議若因自相成者彼則應常由作者因相故常不思議不成由以神我為因相故常不思議因相不成大慧我第一義常不思議第一義因相成離性非性得自覺相故有相第一義智因故有因離性非性故至此因相有無俱離譬如無作虗空涅槃滅盡故常注云如三無為法離有無相故常以譬第一義因相離有無故常如是大慧不同外道常不思議論如是大慧此常不思議諸如來自覺聖智所得如是故常不思議自覺聖智所得應當修學復次大慧外道常不思議無常性異相因故實叉云以無常異相因故常非自作因相力故常此自作因常非彼異相因常也復次大慧諸外道常不思議於所作性非性無常見已思量計常外道見色性無常妄計神我而為常大慧我亦以如是因緣所作者性非性無常見已自覺聖境界説彼常無因如來引外道計色性無常為常因即就自覺聖智破彼常因為非常因也義見下文無因下大慧若復諸外道因相成常不思議因自相性非性同於兔角此常不思議但言説妄想如來前云我常不思議第一義因相成離性非性今於諸外道因相成下亦云常不思議因自相性非性者何也蓋性者有也非性者無也如來之因相成離有無故得自覺聖相第一義智然此智相亦俱離有無則因相實有外道之因相成不離有無計神我無常為常則因相非有故同兔角但有言説妄想初無實體耳諸外道輩有如是過所以者何謂但言説妄想同於兔角自因相非分結上言説妄想初無實體況無自因相大慧我常不思議因自覺得相故離所作性非性故常此明如來自因相之常體也非外性非性無常思量計常外即外道大慧若復外性非性無常思量計常不思議常而彼不知常不思議自因之相去得自覺聖智境界相遠流支云以內身聖智證境界相故彼既不知常不思議自因之相則去自覺聖智境界相遠矣彼不應説注云外道不應説有常不思議復次大慧諸聲聞畏生死妄想苦而求涅槃不知生死涅槃差別一切性妄想非性實叉云一切皆是妄分別有無所有故未來諸根境界休息作涅槃想非自覺聖智趣藏識轉實義云妄計未來諸根境滅以為涅槃不知證自智境界轉所依藏識為大涅槃是故凡愚説有三乘説心量趣無所有是故大慧彼不知過去未來現在諸如來自心現境界生死輪常轉實叉云彼愚癡人説有三乘不説唯心無有境界大慧彼人不知去來現在諸佛所説自心境界取心外境常於生死輪轉不絶楊云自心現則覺知所現唯自心外心現則計著客塵不自覺計著客塵茲所以生死輪常轉也復次大慧一切法不生是過去未來現在諸如來所説所以者何謂自心現性非性離有非有生故大慧一切性不生一切法如兔馬等角是愚癡凡夫不覺妄想自性妄想故大慧一切法不生自覺聖智趣境界者一切性自性相不生非彼愚夫妄想二境界外心現一切諸法不生是三世如來所説所以者何謂自心現性非性離有非有生二種見故不生此就智者知諸法無生起佛種性如兔馬等角本來不生凡愚不覺妄取生滅唯如來自覺聖智趣境界一切法自體性相不生非愚夫有無分別境界自性身財建立趣自性相大慧藏識攝所攝相轉愚夫墮生住滅二見希望一切性生有非有妄想生非聖賢也大慧於彼應當修學言自性五識身財建立諸趣自性相以藏識攝七識身所得法故有生死相轉而諸愚夫墮生住滅二見中一切性生為取有無故因有無故分別妄想復生非聖賢也於彼一切法不生勉當修學復次大慧有五無間種性前章以聲聞起佛乘種性今明種性相也無間者謂佛及衆生同一法性初無有間以機緣有異故分之為五種性者宗鏡云相似曰種體同曰性云何為五謂聲聞乘無間種性緣覺乘無間種性如來乘無間種性不定種性各別種性云何知聲聞乘無間種性若聞説得陰界入自共相斷知時舉身毛孔熙怡欣悅及樂修相智不修緣起發悟之相是名聲聞乘無間種性斷知時知苦斷集證滅修道時也相即悲喜異相智即我生已盡等四智也聲聞無間見第八地注云證八地無生以為涅槃起煩惱斷習煩惱不斷注云四住為起煩惱無明為習煩惱不度不思議變易死度分段死義見不離習氣不思議變易死下注正師子吼我生已盡梵行已立不受後有如實知修習人無我乃至得般涅槃覺此明聲聞但斷三界現行煩惱未斷習使及所知障未度不思議變易死諸魔外中決定唱言我得四智究竟覺乃至得般涅槃覺也大慧各別無間者注云此外道計我人衆生各各差別我人衆生壽命長養士夫見前注彼諸衆生作如是覺求般涅槃復有異外道説悉由作者見一切性已言此是般涅槃作如是覺法無我見非分彼無解脫實叉云彼無解脫以未能見法無我故大慧此諸聲聞乘無間外道種性不出出覺為轉彼惡見故應當修學實叉云此是聲聞乘及外道種性於未出中生出離想應勤修習捨此惡見聲聞取自共相法外道計有神我性皆不出妄覺故勤修習轉彼惡見而趣如來種性故大慧緣覺乘無間種性者若聞説各別緣無間舉身毛竪悲泣流淚不相近緣所有不著種種自身種種神通若離若合種種變化聞説是時其心隨入若知彼緣覺乘無間種性已隨順為説緣覺之乘是名緣覺乘無間種性相言若知因緣各別不和合而不近諸緣不著所有或時聞説現種種身或離一身為多身或合多身為一身及於神通變化心有所得是為緣覺乘種性然有二種不同一遇佛演説十二因緣法依以受行名為緣覺即如上説二出無佛世覩緣自悟名為獨覺大慧彼如來乘無間種性有四種謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性妙體圓明曰自性法無間不守自性曰離自性法無間匪從外得曰得自覺聖無間平等法界曰外剎殊勝無間大慧若聞此四事一一説時及説自心現身財建立不思議境界時心不驚悕者是名如來乘無間種性相前文云頓為顯示不思議智最勝境界大慧不定種性者謂説彼三種時隨説而入隨彼而成楊云未到如來乘無間故言三種而已此不定人隨説信入順學而成其性可移故言不定大慧此是初治地者謂種性建立為超入無所有地故作是建立新説云初治地人即不定種性者三乘俱可入也為説是種性令彼明悟了權趣實超入第八無所有地任運至如來地故作是建立彼自覺藏者自煩惱習淨見法無我得三昧樂住聲聞當得如來最勝之身實叉云彼住三昧樂聲聞若能證知自所依識見法無我淨煩惱習畢竟當得如來之身爾時世尊欲宣此義而説偈言須陀槃那果往來及不還逮得阿羅漢是等心惑亂須陀槃那或云須陀洹此翻入流又預流初果也往來二果不還三果阿羅漢四果以是等四果聖人心憎愛為惑亂三乘與一乘非乘我所説愚夫少智慧諸聖遠離寂如來為愚夫少智聲聞趣寂説三乘非乘而立一乘一對三設三既不存一亦非有故實叉云為愚夫少智樂寂諸聖説遠離寂離欲寂滅也第一義法門遠離於二教住於無所有何建立三乘第一義門尚遠離權實二教諸法悉無所有況建立三乘乎諸禪無量等無色三摩提受想悉寂滅亦無有心量諸禪無量等謂四靜慮四無量心也無色三摩提即無色界四空處定也受想悉寂滅謂聲聞滅盡定也言如來説諸禪三昧等諸法亦無有實為妄想心量愚夫作如是説故云亦無有心量上明正智竟下約菩薩闡提知生死涅槃無二以明如如義大慧彼一闡提非一闡提世間解脫誰轉解脫之道非菩薩住一闡提以自願方便力故則不能復生彼斷善根一闡提善根之性然非彼斷善根一闡提則不能成就住一闡提菩薩自願方便故曰世間解脫誰轉大慧一闡提有二種一者捨一切善根及於無始衆生發願云何捨一切善根謂謗菩薩藏及作惡言此非隨順修多羅毗尼解脫之説捨一切善根故不般涅槃注云此闡提以斷一切善根故不得涅槃二者菩薩本自願方便故非不般涅槃一切衆生而般涅槃大慧彼般涅槃是名不般涅槃法相此亦到一闡提趣以菩薩願力欲令一切衆生得般涅槃已然後涅槃故實叉云願一切衆生悉入涅槃若一衆生未涅槃者我終不入言一闡提以謗菩薩以謗菩薩藏故不得涅槃菩薩知生死即涅槃亦更不得涅槃以不得涅槃名同故云此亦到一闡提趣是名不般涅槃法相也大慧白佛世尊此中云何畢竟不般涅槃佛告大慧菩薩一闡提者知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也大慧捨一切善根一闡提者復以如來神力故或時善根生所以者何謂如來不捨一切衆生故以是故菩薩一闡提不般涅槃言捨善根一闡提以如來神力故或時善根生得涅槃是故菩薩知生死即涅槃故言不般涅槃也已上明如如竟復次大慧菩薩摩訶薩當善三自性注云上雖分別三自性為五法未知何者是三自性故下正明三自性體也云何三自性謂妄想自性緣起自性成自性即名相妄想正智如如五法中之三自性也大慧妄想自性從相生相即名相是緣起自性也謂妄想自性從緣起名相生大慧白佛言世尊云何妄想自性從相生佛告大慧緣起自性事相相行顯現事相相謂依緣起事相之相心行計著顯現事相之相也計著有二種妄想自性如來應供等正覺之所建立謂如來所説計著此事相相則起二種妄想自性實叉以建立為演説謂名相計著相及事相計著相名相計著相者謂內外法計著事相計著相者謂即彼如是內外自共相計著是名二種妄想自性相若依若緣生是名緣起實叉云從所依所緣起是緣起性云何成自性謂離名相事相妄想聖智所得及自覺聖智趣所行境界是名成自性如來藏心楊云惟自覺聖乃可言成自性惟成自性乃可言如來藏心爾時世尊欲重宣此義而説偈言名相覺想自性二相正智如如是則成相實叉云名相分別二自性相正智如如是圓成性二相即緣起妄想二自性相也大慧是名觀察五法自性相經自覺聖智趣所行境界結答上所問唯願為説分別自性經及聖智事汝等諸菩薩摩訶薩應當修學復次大慧菩薩摩訶薩善觀二種無我相注云既能修學五法三自性已更當觀察人法二無我相云何二種無我相謂人無我及法無我得人無我知衆生無性得法無我知諸法無性云何人無我謂離我我所陰界入聚無知業愛生眼色等攝受計著也識一切諸根自心現器身藏自妄想相施設顯示實叉云又自心所見身器世間皆是藏心之所顯示新説云云何人無我謂離我云何離我謂於我所陰界入中分別觀察但是無明業愛等生於眼識等諸根妄取自心現妄想境界皆是藏心妄想施設彼無有我也此即就陰界入中以示無我如河流如種子如燈如風如雲剎那展轉壞躁動如猿猴新説云自下約喻舉五觀門以明無我此舉無常門也夫我謂常義今既無常故無有我文標六喻上五喻幻身下一喻妄心如水奔流種牙變易燈藉衆緣飄風不住浮雲起滅以上諸喻剎那變壞此身亦爾豈有常耶又妄心躁動等若猿猴既不能令身心常住我義焉在樂不淨處如飛蠅舉不淨門明其無我我謂淨義故知無我無厭足如風火舉苦門以破我既無有樂故知無我無始虗偽習氣因如汲水輪生死趣有輪舉不自在門以示無我即業因所推豈有實我種種身色如幻術神呪機發像起此舉空門以破我謂觀陰界入種種身色譬如呪術機關變現云為實非我也善彼相知是名人無我智實叉云若能於此善知其相是名人無我智云何法無我智謂覺陰界入妄想相自性觀陰界入法知是妄想相自性無實故如陰界入離我我所陰界入積聚因業愛繩縛展轉相緣生無動搖實叉云互為緣起無能作者諸法亦爾離自共相不實妄想相妄想力是凡夫生非聖賢也心意識五法自性離故不實妄想之相妄想分別之力是凡夫所生聖賢於五法自性離故故曰非也大慧菩薩摩訶薩當善分別一切法無我善法無我菩薩摩訶薩不久當得初地菩薩無所有觀地相觀察開覺歡喜以見法無我得初地無所有觀以無所有觀故善能觀察真如之境能觀察真如之境則能開覺證如實之相由此欣悅次第進超諸地故實叉云得此智已知無境界了諸地相即入初地心生歡喜次第漸進超九地相得法雲地於彼建立無量寶莊嚴大寶蓮華王像大寶宮殿幻自性境界修習生於彼而坐實叉云住是地已有大寶蓮華王衆寶莊嚴於其華上有寶宮殿狀如蓮華菩薩往修幻性法門之所成就而坐其上同一像類諸最勝子眷屬圍繞謂昔同修菩薩以為眷屬也從一切佛剎來佛手灌頂如轉輪聖王太子灌頂一切諸佛從十方來各以智水灌菩薩摩訶薩頂授法王之位如轉輪王授太子王位時以金瓶盛四大海水灌太子頂授轉輪王位超佛子地到自覺聖智法趣當得如來自在法身見法無我故是名法無我相汝等諸菩薩摩訶薩應當修學爾時大慧菩薩摩訶薩復白佛言世尊建立誹謗相唯願説之注云因上觀二無我能離有無常二見故請建立誹謗相也非有説有名建立非無説無名誹謗令我及諸菩薩摩訶薩離建立誹謗二邊惡見疾得阿耨多羅三藐三菩提覺已離常建立斷誹謗見不謗正法注云覺知有無惡見過已能離建立常見誹謗斷見令於正法不生毀謗蓋正法離有無若説有無即是謗正法也爾時世尊受大慧菩薩請已而説偈言建立及誹謗無有彼心量建立誹謗初無有實故曰無有彼心量身受用建立及心不能知身雖受用建立而心不知其然故實叉云所起但是心離心不可得愚癡無智慧建立及誹謗愚夫執有執無為實也爾時世尊於此偈義復重顯示告大慧言有四種非有有建立云何為四謂非有相建立非有見建立非有因建立非有性建立是名四種建立新説云此列四名謂非有相見因性之中而橫立也又誹謗者謂於彼所立無所得觀察非分而起誹謗是名建立誹謗相實叉云謂於諸惡見所建立法求不可得不善觀察遂生誹謗此是建立誹謗相復次大慧云何非有相建立相謂陰界入非有自共相而起計著此如是此不異是名非有相建立相此非有相建立妄想無始虗偽過種種習氣計著生新説云言陰界入無自共相而妄計此如是自相也此不異共相也從無始過惡熏習所生故也大慧非有見建立相者若彼如是陰界入我人衆生壽命長養士夫見建立是名非有見建立相新説云謂於陰界入中妄建立我人衆生等以為能見者大慧非有因建立相者謂初識無因生後不實如幻本不生眼色明界念前生生已實已還壞是名非有因建立相謂識初則無因而生後則不實如幻故曰本不生眼色明界念雖生生已實已還壞亦本不生之意也大慧非有性建立相者謂虗空滅般涅槃非作計著性建立此離性非性一切法如兔馬等角如垂髮現離有非有是名非有性建立相新説云言外道於三無為無作法而建立有性佛言此離性非性類明一切諸法離於有無猶如毛輪垂髮由翳目而生兔馬等角本自無有建立及誹謗愚夫妄想不善觀察自心現量非聖賢也是故離建立誹謗惡見應當修學復次大慧菩薩摩訶薩善知心意意識五法自性二無我相趣究竟為安衆生故作種種類像如妄想自性處依於緣起菩薩既善知心意識自性無我趣於究竟為安諸衆生故隨其善根種類化身誘之如妄想依緣起而生下舉喻正明所化之剎所説之法也譬如衆色如意寶珠普現一切諸佛剎土一切如來大衆集會悉於其中聽受佛法所謂一切法如幻如夢光影水月於一切法離生滅斷常及離聲聞緣覺之法得百千三昧乃至百千億那由他三昧得三昧已遊諸佛剎供養諸佛生諸天宮宣揚三寶示現佛身聲聞菩薩大衆圍繞以自心現量度脫衆生分別演説外性無性實叉云説外境界皆唯是心悉令遠離有無等見新説云如摩尼珠不作心而隨色變以譬如來不作意能隨衆生善根心水大小而變亦如摩尼隨物而變以譬如來隨衆生善根現取佛土大衆集會於中説法其所説諸法不實如幻夢等菩薩既知諸法如幻而離生滅斷常等見亦離二乘自共相見得諸地無量億三昧現成正覺復説自心現量法令衆離無等見爾時世尊欲重宣此義而説偈言心量世間佛子觀察種類之身離所作行得力神通自在成就以善觀察世間心量如幻三昧之力成如來現種類身得無作行等一切成就也爾時大慧菩薩摩訶薩復請佛言惟願世尊為我等説一切法空無生無二離自性相新説云因上説一切法如幻如夢即是説法空故大慧舉此空法以請如來所言空者明前五法非有無生以顯八識不生無二即二我兩亡離性即三性空寂我等及餘諸菩薩衆覺悟是空無生無二離自性相已離有無妄想疾得阿耨多羅三藐三菩提爾時世尊告大慧菩薩摩訶薩言諦聽諦聽善思念之今當為汝廣分別説大慧白佛言善哉世尊唯然受教佛告大慧空空者即是妄想自性處流支云即是妄想法體句實義云即是妄計性句義大慧妄想自性計著者説空無生無二離自性相大慧彼略説七種空謂相空性自性空行空無行空一切法離言説空第一義聖智大空彼彼空諸教辨空自有增減此經雖略其義不殊云何相空謂一切性自共相空觀展轉積聚故分別無性自共相不生自他俱性無性故相不住是故説一切性相空是名相空觀諸法相空展轉因緣積聚故分別無性則自相共相不生自他俱無體故相依何住云何性自性空謂自己性自性不生是名一切法性自性空是故説性自性空自己之性自性不生則一切法自性不生不生則空矣云何行空謂陰離我我所因所成所作業方便生是名行空陰行從諸緣所起以離我我所故空大慧即此如是行空展轉緣起自性無性是名無行空前以離我我所為行空此以行空性無性故為無行空云何一切法離言説空謂妄想自性無言説故一切法離言説是名一切法離言説空一切法從妄想所起無自性故離言説云何一切法第一義聖智大空謂得自覺聖智一切見過習氣空是名一切法第一義聖智大空云何彼彼空謂於彼無彼空是名彼彼空於彼無此於此無彼展轉俱空故也大慧譬如鹿子母舍無象馬牛羊等非無比丘衆而説彼空非舍舍性空亦非比丘比丘性空非餘處無象馬實叉云非謂堂無堂自性非謂比丘無比丘自性非謂餘處無象馬牛羊新説云鹿子人名也其母即毗舍佉優婆夷深重三寶造立精舍安止比丘於中不畜象馬等象馬無故言空舍及比丘有不名空若餘處有象馬亦不説象馬空是名一切法自相彼於彼無彼是名彼彼空實義云一切諸法自共相彼彼求不可得是故説名彼彼空是名七種空彼彼空者是空最粗汝當遠離新説云言是空最粗非是真空故勸遠離西土外道所宗在彼彼空處或計為神我或執為斷常第一義聖智大空非彼所聞也大慧不自生非不除住三昧是名無生注云除住八地如幻三昧是名真無生離自性即是無生實叉云無自性者以無生故離自性剎那相續流注及異性現一切性離自性是故一切性離自性實叉云一切法無自性以剎那不住故見後變異故是中無自性楊云剎那之頃流及他性以是而現一切性皆離自性云何無二謂一切法如陰熱如長短如黑白流支以陰熱作日光影實叉作如光影此則以雲氣蒙蔽為陰光明燀赫為熱言陰熱長短黑白雖殊而日體無異以況涅槃生死之無二也大慧一切法無二非於涅槃彼生死非於生死彼涅槃異相因有性故是名無二如涅槃生死一切法亦如是實叉云非於生死外有涅槃非於涅槃外有生死生死涅槃無相違相如生死涅槃一切法亦如是是名無二相新説云謂了妄想性空即生死成涅槃若迷真實性有即涅槃成生死如生死涅槃既無二類通一切法亦爾相因有性故非無二涅槃生死既異於相因有性則自然平等無二矣是故空無生無二離自性相應當修學爾時世尊欲重宣此義而説偈言我常説空法遠離於斷常生死如幻夢而彼業不壞宗鏡云以性空故不壞業道因果歷然虗空及涅槃滅二亦如是愚夫作妄想諸聖離有無新説云舉上三無為空不得對涅槃説生死亦不得對生死説涅槃愚夫妄想故説為二聖人體達故離有無爾時世尊復告大慧菩薩摩訶薩言大慧空無生無二離自性相普入諸佛一切修多羅凡所有經悉説此義新説云言空等義普入諸經無有一法不舍斯理諸修多羅悉隨衆生希望心故為分別説顯示其義而非真實在於言説如鹿渴想誑惑羣鹿鹿於彼相計著水性而彼無水新説云此謂會權歸實也而諸經有不説空無生者以衆生希望不一故如來隨衆生心作種種異説而實在乎心悟不在文言譬如羣鹿為渴所逼見春時焰而作水想迷亂馳趣而彼陽焰實非是水如是一切修多羅所説諸法為令愚夫發歡喜故非實聖智在於言説是故當依於義莫著言説楞伽阿跋多羅寶經卷第一楞盧登伽求迦阿於何跋蒲撥涅槃上乃結解脫胡懈徒活揵渠焉蔓無販箜篌音空侯肘陟九蟣舉豈古猛䨲奴侯膩吒下竹嫁珂丘何跛補火驃毗召躁則到已上經文瞰苦濫臆乙力炎焰同核下革綜子米紇下沒徇松閏憒古對燀齒善已上注文音切竟
