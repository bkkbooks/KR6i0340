body:
  text: 集注楞伽阿跋多羅寶經序朝議大夫新淮東安撫司參議官竹齋沈瀛撰我佛以一大事因緣出現於世三百餘會説法度衆生本無二致以衆生性有上中下之別故佛語有淺深之異於諸經中如楞嚴圓覺皆為上根者説故其語深遠惟上根之人方可了解而初機者未易究也至若楞伽一經以楞伽為名實相為體佛語心為宗自覺聖智為用其語深遠又在楞嚴圓覺諸經之上故目今所説上根之人無如內翰蘇公尚曰楞伽義趣幽眇文字簡古讀者尚不能句而況遺文以得義忘義以了心所以寂寥於世幾廢而僅存而況餘人乎少傅白公樂天與常禪師詩有求師治此病惟勸讀楞伽又曰人間此病治無藥惟有楞伽四卷經荊國王公介甫亦曰楞伽我亦見髣佛是知此經惟上上根人所深好而研窮之其它人莫識也達磨謂二祖曰吾觀震旦所有經教惟楞伽四卷可以印心祖祖相授心為心法則知傳心之印無出此經有自來矣今世談禪者浩浩而於此經謾不知有非不知有正以所見不高不能深識義趣故不敢啓口耳蘇內翰又謂近世學者各宗其師務從簡便得一句一偈自謂了證至使婦人孺子抵掌嬉笑爭談禪悅高者為名下者為利而佛法微矣乃謂此經句句皆理字字皆法如醫之有難經今俚俗醫師不由經論直授方藥以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語世人徒見其有一至之功或捷於古人因謂難經不學而可豈不誤哉此正謂今日設也仰惟雷菴受公老師飽學飽參既有實學遂見實相非今虗頭禪衲比也人皆於此經讀尚不成句讀師乃敢抗志而注釋之非精勤力學不能到也且其注釋又非今講人之比字字訂前人之訛句句説經意之盡其文不晦僻其義又坦明使蘇內翰復生而見之亦歡喜讚歎不盡而況餘人乎凡於此道得其趣者而觀之當手之而不釋也竹齋沈瀛既見是書合掌頂禮普勸四衆至心讀誦詳其注義使佛語渙然冰釋於一句中頓明見地即達磨付囑之意便在眼前其一堆八擔葛藤便可束之高閣矣昔太保樂全張公安道慶曆中嘗為滁州至一僧舍偶見此經入手恍然如獲舊物開卷未終夙障冰解細視筆畫手迹宛然悲喜太息從是悟入常以經首四偈發明心要蘇內翰過南都親見公説且以錢三十萬託公印施於江淮間而內翰親為之書此經印人心地明驗如此敬庵居士黃公師説靜照居士仲威之子妙德居士節夫之姪孫心心相傳其於此經深解義趣捐金鏤板以廣流通是亦樂全公之意也若其注釋本末則具見於雷菴閣筆記此不重述惟以世人所共知蘇內翰張太保二事冠于篇首以啓人之信心云雷菴又有普燈三十卷及楞嚴合論捋繼此行于世嗚呼盛哉嗚呼盛哉慶元二年重午日序楞伽阿跋多羅寶經集注題辭大雄氏所説阿跋多羅寶經凡經三譯其四卷者宋元嘉中中印度求那跋陀羅也其十卷者後魏延昌中北印度菩提流支也逮至於唐實義難陀來自于闐復以跋陀之譯未弘流支之義多舛與僧復禮重翻為七卷則久視初也於是判教諸師提綱挈領李通玄則以五法三自性八識二無我為言智覺延壽則以實相佛語心自覺聖智為言一則因理以顯事一則從事以推理理事兼究則經之奧義無餘蘊矣然自菩提達磨東來震旦謂此經四卷可以印心遂授其徒慧可故宗禪定者世受其説而其文辭簡嚴卒未易通所以傳之者寢微至宋張文定公方平見於南譙悟其為前身所書乃以錢三十萬屬蘇文忠公軾印施江淮間蘇公親為書之且記其事自是流布漸廣雷菴禪師正受病句讀之難通也與同袍智燈據跋陀之本而參以魏唐二譯原其異同歷疏於經文之下復稽唐注古本暨宋僧寶臣閩士楊彥國之説而折衷之凡經論疏録有涉於經者亦撫其精華附焉名之曰楞伽寶經集注自慶元乙卯之三月至丙辰之四月始克就緒其用心可謂勤矣且如來説經不即語言不離語言矧此楞伽實詮圓頓八識洞然號如來藏大包無外小入無內本性全真即成智用觀身實相與淨名同若彼二乘滅識趣寂譬如迷人忘己之頭狂走呼號別求首領此乃諸佛心地法門不假修證現前成佛禪宗之要蓋莫切於此矣或者則曰西來之宗一文不設若謂初祖持此印心非愚則惑子不聞達觀頴公之言乎曰不然也佛法隨世以為教當達摩時衆生滯相離心故入義學者悉斥去之達觀之言猶達摩之意也苟不察其救弊微權而據以為實則禪那乃六度之一世尊所指持戒為禪定智慧之本者還可廢乎雷菴之注其有功於禪宗甚大非上根宿智不知豫言之為當也此經舊嘗刻板近毀於火天界禪師白菴金公意欲流通乃購文梓重刻于旃檀林來徵豫為之序豫幼時頗見正平張戒集三譯之長采諸家之注成書八卷以傳大意略同惜雷菴不及見之白菴妙悟真乘旁通儒典為叢林之所宗師苟求其説而補入之則其功又豈不大於雷菴哉洪武四年夏五月國子司業金華宋濂序大明洪武辛亥重刊楞伽經集注凡例雷菴宋慶元本為舊本茲重刊為今本楞伽凡三譯其説備在舊本閣筆記及今本題辭四卷流通特盛者宋譯也雷菴之集注是經遇文簡義深處則以魏唐二譯附其下欲看讀者參考融會則滯礙自當釋然然其間有不甚難通處而亦證以一譯者今去之有合備引而節之者今備引之舊本所集諸家注則唐遺名尊宿周元翁於廬山古經藏中所得本宋沙門寶臣新説閩人楊彥國所纂及諸經論宗鏡録等其注字無其經其論其人云者乃雷菴之述也但新説本為唐譯七卷而作唐譯既與宋譯之文有異則經之與説豈無相違然臣公學贍識高詞理修暢深得楞伽旨趣脈絡貫通無施不可今本全用新説處則曰新説云其説與是經之文不同處未免修詞順義以就經文則不顯新説云又或以注云楊云及新説會而釋之處以非一家之説故亦不顯注云楊云新説云而直以云云綴於經文之下竊惟古人注釋之意本為使人易解善入忘義了心某云某云初不較於彼此也舊本或因經文一二字與他本不同處則曰注本作某字楊本蘇本又作某字某字今唯取義優理當者餘皆不録庶使學者無多岐之惑凡注疏或章分或句解自有條理若一句中又破碎之未為盡善今詳舊本或合而一之節而異之大意多本新説初非胸臆之見義例雖未能純然頗便於覽誦庶幾經旨由斯而得矣經教句讀大率不易又何況於此經故蔣頴叔謂嘗苦楞伽經難讀蘇東坡云讀者或不能句今輒句讀之者誠欲便於初學中間差謬安能無之上機了達豈泥於此科字之法見於儒書者今本悉準而科之或前已科而後失科者後當例前而呼若梵語某字當作某音呼者嘗讀佛經之人口耳素已習熟更不加科如阿跋多羅阿羅阿䨲般涅槃般若等是也解脫二字雖非梵語唯釋典有之故亦不科教家論解脫上胡懈切下徒活切解脫二字並如本音有二音有二義茲不詳録凡如此等安能悉舉覽者宜以類推凡例終楞伽阿跋多羅寶經卷第一宋天竺三藏求那跋陀羅譯大宋胥臺沙門釋正受集注楞伽者此云不可往阿云無跋多羅云上寶貴重義經貫攝義是名不可往無上寶經謂自覺聖究竟之境非邪智可造故曰不可往隨衆色摩尼之珠非世寶可比故曰無上謂不可往處有此無上寶也不可往是喻無上寶亦喻也此經蓋以單譬立題華嚴論云世尊於南海摩羅耶山之頂楞伽城中説法其山高五百由旬下瞰大海無路可上其城乃衆寶所成光映日月無門可入得神通者堪能升往表心地法門無修無證者方能升也下瞰大海表心海本自澄淨因境風所轉識浪隨動惟心空境寂則此識浪無復起矣識浪既息物無不鑑猶如大海無風日月星辰等象炳然顯現此經乃為根熟者頓説種子業識為如來藏異彼二乘滅識趣寂者故亦為異彼般若修空菩薩空增勝者故蓋直明識體本性全真即成智用非彼深密別立九識接引初根漸令留惑長大菩提不令其心植種於空亦不令心猶如敗種解深密經乃是入惑之初門楞伽維摩直示惑之本實楞伽即明八識為如來藏淨名即觀身實相觀佛亦然淨名與楞伽同深密經文則與此二部少別當知入胎出胎少年老年乃至資生住處若色若空若性若相皆是自識唯佛能知一經之旨槩見於此一切佛語心品第一一切佛語心者乃三世諸佛所説性自性第一義心也品者類也別也義類相從故名為品第一者此經大部有十萬偈百萬句三千六萬言總有一百五十一品今所傳者止有佛語心品分之為四故言第一也如是我聞一時佛住南海濱楞伽山頂實叉云婆伽婆住大海濱摩羅耶山頂楞伽城中其城乃羅婆那夜叉王所據蓋佛於海龍王宮説法七日已而從大海出有無量億梵釋護世天龍等衆奉迎於佛爾時世尊舉目觀見山頂之城而作是言昔諸如來應正等覺皆於此城説自所得聖智證法非諸外道臆度邪見及以二乘修行境界我今亦當為羅婆那王開示此法爾時羅婆那夜叉王以佛神力聞佛言音即與眷屬乘華宮殿往世尊所右繞三匝作衆妓樂而供養之説偈請佛歸其城中云云流支所譯大略相似唯此經止云佛住南海濱楞伽山頂而不言城者蓋跋陀之文尚於簡古也故於下文至一切佛語心為楞伽國摩羅耶山諸大菩薩説如來所歎海浪藏識境界則知其略去山名但以城名混而言之然如是我聞一時佛七字古今諸師皆以信聞時主處衆六成就義科上四字下三字為二句讀之按龍勝論云世尊將入涅槃時阿泥盧豆教阿難問佛未來要事者有四阿難依教請問曰如來在世親自説法人皆信受如來滅後一切經首當立何言世尊答曰當置如是我聞一時六字為句此其四問之一也故今以一時二字聯上句佛字綴下文種種寶華以為莊嚴與大比丘僧及大菩薩衆就接俗情故聲聞在前菩薩在後俱從彼種種異佛剎來是諸菩薩摩訶薩流支於此有具足二字無量三昧自在之力神通遊戲大慧菩薩摩訶薩而為上首一切諸佛手灌其頂自心現境界善解其義種種衆生種種心色無量度門隨類普現於五法自性識二種無我究竟通達五法者曰名曰相曰妄想曰正智曰如如三自性者曰妄想曰緣起曰成識即八識二無我即人法是也馬祖云楞伽以佛語心為宗無門為法門所以成之者在此實義至及大比丘衆下重譯云其諸菩薩摩訶薩悉已通達五法三性諸識無我善知境界自心現義遊戲無量自在三昧神通諸力隨衆生心現種種形方便調伏一切諸佛手灌其頂皆從種種諸佛國土而來此會大慧菩薩摩訶薩為其上首爾時大慧菩薩與摩帝菩薩摩帝此云慧俱遊一切諸佛剎土承佛神力從座而起偏袒右肩右膝著地合掌恭敬以偈讚佛世間離生滅猶如虗空華智不得有無而興大悲心一切法如幻遠離於心識智不得有無而興大悲心遠離於斷常世間恆如夢實叉云世間恆如夢遠離於斷常智不得有無而興大悲心知人法無我煩惱及爾𦦨流支以爾焰為智障實叉以爾焰為所知所知即智障煩惱亦障也爾焰是梵語智障所知是華言焰蘇楊二本作炎後類此常清淨無相而興大悲心一切無涅槃無有涅槃佛無有佛涅槃實叉云佛不住涅槃涅槃不住佛遠離覺所覺宗鏡云所覺是相能覺是見遠離覺所覺名自覺聖智若有若無有是二悉俱離牟尼寂靜觀是則遠離生流支云若如是觀佛寂靜離生滅是名為不取今世後世淨實義云是人今後世離著無所取爾時大慧菩薩偈讚佛已自説姓名我名為大慧通達於大乘注云自言有大乘機今以百八義仰咨尊中上世間解之士聞彼所説偈觀察一切衆告諸佛子言此四句乃結集者之語當為長行故實叉云時世間解聞是語已普觀衆會而作是言汝等諸佛子今皆恣所問我當為汝説自覺之境界實叉云自證之境界爾時大慧菩薩摩訶薩承佛所聽頂禮佛足合掌恭敬以偈問曰云何淨其念云何念增長注云淨如來藏心念使法身淨念顯現增長云何見癡惑云何惑增長注云愚夫妄取有無增長生死何故剎土化相及諸外道此問如來於剎土中化諸衆生及諸外道所化之化相然相字雖屬下句而義屬上句如下文云如來云何於一切時剎現則於字屬上句而義屬下句教中有文句有義句義句則義局於句文句則句局於義此二偈句當在義句中收云何無受次何故名無受上句問滅受想定之次第下句問定體何因而名何故名佛子解脫至何所誰縛誰解脫何等禪境界云何有三乘唯願為解説緣起何所生云何作所作新説云問因緣所起本自無生若體不生何有能生因及所作果云何俱異説此舉外道妄計一異俱不俱有無非有非無常無常四句疊上二句問之云何為增長實叉云云何諸有起云何無色定四空定也及與滅正受滅盡定也云何為想滅滅受想定也何因從定覺問受想既滅何因從定而覺若從定覺滅義不成云何所作生進去及持身流支云云何因生果何因身去住進即去義持即住義云何現分別流支云何因觀所見云何生諸地實叉作入諸地破三有者誰何處身云何注云此問破三有處及以何身破三有往生何所至實叉云生後住何處注云既破三有後何處生云何最勝子流支作諸佛子何因得神通及自在三昧云何三昧心最勝為我説云何名為藏如來藏也云何意及識云何生與滅云何見已還問云何了知生滅諸法不待斷所見而已還無見之見故流支以見已還為斷所見也云何為種性非種及心量問五無間種性也非種即外道種心量即不定種也性蘇楊二本作姓云何建立相及與非我義云何無衆生真諦也云何世俗説俗諦也云何為斷見及常見不生注云非有立有名常見非無立無名斷見云何佛外道其相不相違云何當來世種種諸異部注云問未來十八部之差別云何空何因流支作名為空云何剎那壞新説云剎那名念壞名無常又俱舍論云時之極少名剎那念起曰生念滅曰壞云何胎藏生云何世不動注云問世間諸法體性生滅何故不動何因如幻夢及揵闥婆城世間熱時焰及與水月光實叉云云何諸世間如幻亦如夢乾城及陽焰乃至水中月何因説覺支及與菩提分七覺支八聖道分也云何國土亂問名相妄想法中云何有國土亂云何作有見實叉云何故見諸有云何不生滅世如虗空華云何覺世間云何説離字實叉云云何知世法云何離文字云何如空華不生亦不滅離妄想者誰云何虗空譬實叉作如虗空如實有幾種真如實際也幾波羅蜜心實叉云諸度心有受何因度諸地誰至無所受問何因得超諸地之次第又誰能至無所受之境無所受即無所有處也何等二無我云何爾𦦨淨諸智有幾種幾戒衆生性注云衆生性既別教戒有幾種誰生諸寶性摩尼真珠等誰生諸語言衆生種種性明處及伎術誰之所顯示流支云五明處伎術五明大論云五明者一曰聲明釋詁訓字注目流別二曰工巧明伎術機關陰陽曆數三曰醫方明禁呪間邪藥石針艾四曰因明考定正邪研竅真偽五曰內明究暢五乘因果妙理伽陀有幾種長頌及短句伽陀此云頌成為有幾種流支以成為法實叉以成為道云何名為論云何生飲食及生諸愛欲飲食愛欲因何而起云何名為王轉輪及小王云何守護國諸天有幾種云何名為地星宿及日月已上問名相解脫修行者是各有幾種弟子有幾種云何阿闍梨此云軌範師佛復有幾種復有幾種生謂佛有法生報生化生故以為問魔及諸異學彼各有幾種自性及與心彼復各幾種實叉云自性幾種異心有幾種別云何施設量流支作施假名實叉作唯假設唯願最勝説云何空風雲流支云何因有風雲云何念聰明注云總問何故名念而復名聰明云何為林樹云何為蔓草云何象馬鹿云何而捕取云何為卑陋何因而卑陋云何六節攝流支實叉皆以六節為六時注云外道有六節師新説云西域兩月為時年分六節云何一闡提德王品云一闡名信提名不具信不具故名一闡提男女及不男斯皆云何生云何修行退云何修行生流支實叉皆作修行進禪師以何法建立何等人流支云教何等人修令住何等法衆生生諸趣何相何像類云何為財富何因致財富實叉云衆生生諸趣何形何色相富饒大自在此復何因得云何為釋種何因有釋種云何甘蔗種無上尊願説本行經云大茅草王得成王仙被獵師所射滿血於地生二甘蔗日炙而開一出童男一出童女占相師立男名善生即灌頂甘蔗王女名善賢第一妃瞿曇釋種即其裔也云何長苦仙彼云何教授如來云何於一切時剎現種種名色類最勝子圍繞實叉云仙人長苦行是誰之教授何因佛世尊一切剎中現異名諸色類佛子衆圍繞云何不食肉云何制斷肉食肉諸種類何因故食肉云何日月形須彌及蓮華師子勝相剎側住覆世界如因陀羅網因陀羅此云帝即帝網也注本云帝釋有衆寶風絲羅網雖百千重不相障礙或悉諸珍寶箜篌細腰鼓狀種種諸華或離日月光如是等無量自日月形至此問世界形相差別無量華嚴經云種子差別故果實生不同行業若干故佛剎種種異云何為化佛云何報生佛云何如如佛云何智慧佛實叉疊如如智慧為真如智慧佛新説云問佛名義也隨機赴感應化佛酬其往因名報佛體性無二真如佛本覺顯照智慧佛云何於欲界不成等正覺何故色究竟離欲得菩提善逝般涅槃誰當持正法新説云問盧舍那佛成菩提界及問涅槃後誰持正法天師住久如正法幾時住流支實叉皆以天師作世尊天師即天人師悉檀及與見各復有幾種悉是華言檀是梵語悉遍也檀翻為施佛以四法遍施衆生故名悉檀餘義見第二卷見謂世諦諸見毗尼比丘分云何何因緣毗尼此云律注云云何是毗尼何因緣是比丘分彼諸最勝子緣覺及聲聞何因百變易云何百無受云何世俗通云何出世間云何為七地唯願為演説實叉云悉檀有幾種諸見復有幾何故立毗尼及以諸比丘一切諸佛子獨覺及聲聞云何轉所依云何得無相云何得世通云何得出世復以何因故心住七地中僧伽有幾種云何為壞僧僧伽此云和合衆流支實叉皆以壞僧為破僧謂破和合僧也云何醫方論是復何因緣新説云問世出世間醫方諸論也何故大牟尼唱説如是言迦葉拘留孫拘那含是我新説云餘經有此言故大慧問之義見第三卷以四等故下何故説斷常及與我無我何不一切時演説真實義而復為衆生分別説心量何因男女林謂衆多如林也訶梨阿摩勒此二果皆可為藥訶梨舊云呵梨勒新云訶梨怛雞此云天王持來阿摩勒其實如胡桃雞羅及鐵圍金剛等諸山無量寶莊嚴仙闥婆充滿實叉云仙人乾闥婆一切悉充滿此皆何因緣願佛為我説自此下是世尊牒領大慧所問語多錯綜未易以次序分無上世間解聞彼所説偈大乘諸度門諸佛心第一梵語乾粟陀耶此云堅固心謂第一義心非念慮心也善哉善哉問大慧善諦聽我今當次第如汝所問説實叉自仙闥婆充滿下云爾時世尊聞其所請大乘微妙諸佛之心最上法門即告之言善哉大慧諦聽諦聽如汝所問當次第説即説偈言生及與不生涅槃空剎那趣至無自性注云大慧所問有為生法無為不生法涅槃虗空剎那法皆想所見初無自性也實叉以空為空相以趣至為流轉佛諸波羅蜜佛子與聲聞緣覺諸外道及與無色行如是種種事實叉疊云波羅蜜佛子聲聞辟支佛外道無色行謂上所問是人及人所行法諸波羅蜜三乘人所行法無色行外道人所行法而人及人所行法皆以趣至無自性結之故云如是種種事須彌巨海山洲渚剎土地星宿及日月外道天修羅解脫自在通力禪三摩提滅及如意足覺支及道品領上何因説覺支及與菩提分力意足覺等即三十七助道品之數也諸禪定無量諸陰身往來新説云領上衆生生諸趣正受滅盡定注云領上及與滅正受三昧起心説領上云何三昧心心意及與識無我法有五自性想所想及與二現見實叉云分別所分別能所二種見乘及諸種性注云領上云何有三乘云何為種性金銀摩尼等一闡提大種下文有四大種義荒亂及一佛智爾𦦨得向注云荒亂領上云何國土亂一佛領上迦葉等是我智爾焰領上云何爾焰淨得向領上解脫修行者衆生有無有新説云領上及與我無我象馬諸禽獸云何而捕取譬因成悉檀實叉云云何因譬喻相應成悉檀及與作所作叢林迷惑通實叉云衆林與迷惑心量不現有實叉云唯心無境界諸地不相至注云領上何因度諸地百變百無受醫方工巧論伎術諸明處自此下至毛孔眉毛幾是世尊以名相塵量徵問大慧故曰何故不問此諸山須彌地實叉云須彌諸山地巨海日月量下中上衆生身各幾微塵一一剎幾塵新説云三千大千世界為一化佛剎弓弓數有幾肘步拘樓舍半由延由延實叉作由旬兔毫窗塵蟣羊毛麥塵譯梵云七微塵成一窗塵七窗塵成一兔毛頭塵七兔毛頭塵成一羊毛頭塵七羊毛頭塵成一牛毛頭塵七牛毛頭塵成一蟣七蟣成一虱七虱成一芥七芥成一大麥七大麥成一指節七指節成半尺兩半尺成一尺二尺成一肘四肘成一弓五弓成一杖二十杖名一息八十息名一俱盧舍八俱盧舍名一由旬鉢他幾麥阿羅麥幾獨籠那佉梨勒義及舉利乃至頻婆羅是各有幾數鉢他一升也阿羅一斗也獨籠一斛也那佉梨十斛也勒叉一萬也舉利一億也頻婆羅一兆也謂幾麥之塵成一升又幾麥之塵為一斗餘皆類此為有幾阿䨲名舍梨沙婆幾舍梨沙婆名為一賴提幾賴提摩沙幾摩沙陀那復幾陀那羅為迦梨沙那幾迦梨沙那為成一波羅此等積聚相幾波羅彌樓阿䨲亦塵也舍梨沙婆芥子也賴提草子也摩沙豆也陀那銖也迦梨沙那兩也婆羅斤也彌樓須彌山也謂以幾斤之塵能成此彌樓之山實叉云幾斤成須彌者是矣是等所應請何須問餘事聲聞辟支佛佛及最勝子身各有幾數何不問佛聲聞身量各有幾塵何故不問此火𦦨幾阿䨲風阿䨲復幾根根幾阿䨲毛孔眉毛幾實叉云火風各幾塵一一根有幾眉及諸毛孔復各幾塵成此下復領大慧所問護財自在王注云領上云何名為王轉輪聖帝王云何王守護云何為解脫廣説及句説如汝之所問衆生種種欲種種諸飲食云何男女林金剛堅固山云何如幻夢野麁渴愛譬云何山天仙揵闥婆莊嚴實叉云云何諸妙山仙闥婆莊嚴解脫至何所誰縛誰解脫云何禪境界變化及外道云何無因作云何有因作有因無因作及非有無因注云此四因領上云何俱異説云何現已滅注云領上見已還云何淨諸覺云何諸覺轉及轉諸所作注云領上云何淨其念云何念增長云何斷諸想云何三昧起破三有者誰何處為何身注云領上何處身云何云何無衆生而説有吾我云何世俗説唯願廣分別實叉疊云云何無有我云何隨俗説流支亦無唯願廣分別一句所問相云何及所問非我云何為胎藏及種種異身注云領上種種名色類云何斷常見云何心得定言説及諸智戒種性佛子云何成及論領上成為有幾種云何名為論云何師弟子種種諸衆生斯等復云何云何為飲食聰明魔施設此一句領上三問謂念聰明魔幾種及施設量也云何樹葛藤領上云何為林樹云何為蔓草最勝子所問云何種種剎仙人長苦行云何為族姓從何師受學云何為醜陋云何人修行欲界何不覺領上云何於欲界不